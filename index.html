<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>PubKey DC — March Madness Live</title>
<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;500;600;700&family=JetBrains+Mono:wght@500;700&family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --btc:#F7931A;--fire:#FF6B00;--lava:#FF3D00;--gold:#FFB800;
  --bg:#050507;--glass:rgba(12,12,18,0.85);--border:rgba(255,255,255,0.06);
  --text:#fff;--muted:rgba(255,255,255,0.5);--dim:rgba(255,255,255,0.25);
  --green:#00E676;--green-bg:rgba(0,230,118,0.1);
  --red:#FF1744;--red-bg:rgba(255,23,68,0.08);
  --blue:#448AFF;--blue-bg:rgba(68,138,255,0.1);
  --madness:#FF6D00;--radius:10px;
}
html,body{width:100vw;height:100vh;overflow:hidden;background:#000;color:var(--text);font-family:'Inter',system-ui,sans-serif;user-select:none}

/* ═══ LOGO BAR — Below markets ═══ */
#logo-bar{position:fixed;top:90px;left:0;right:0;height:40px;display:flex;align-items:center;justify-content:space-between;padding:0 20px;z-index:96;pointer-events:none}
.logo-img{height:26px;width:auto;flex-shrink:0;object-fit:contain;filter:drop-shadow(0 1px 4px rgba(0,0,0,0.5))}
.gemini-img{height:26px;width:auto;flex-shrink:0;object-fit:contain;filter:drop-shadow(0 1px 4px rgba(0,0,0,0.5))}
.logo{font-family:'Oswald',sans-serif;font-size:24px;font-weight:700;letter-spacing:0.06em;color:var(--btc);flex-shrink:0;align-items:center}
.logo span{color:#fff}
.live-dot{width:7px;height:7px;border-radius:50%;background:var(--red);box-shadow:0 0 8px var(--red);animation:pulse 1.4s infinite}
@keyframes pulse{0%,100%{opacity:1;box-shadow:0 0 8px var(--red)}50%{opacity:0.4;box-shadow:0 0 2px var(--red)}}
#clock{position:fixed;bottom:12px;right:16px;font-family:'JetBrains Mono',monospace;font-size:18px;color:var(--muted);z-index:100;text-shadow:0 1px 4px rgba(0,0,0,0.6)}

/* ═══ BTC PANEL — Bottom-left corner ═══ */
#btc-panel{position:fixed;bottom:0;left:0;background:rgba(5,5,7,0.5);backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);border:none;border-right:1px solid rgba(255,255,255,0.04);border-top:1px solid rgba(255,255,255,0.04);border-radius:0 16px 0 0;padding:14px 24px 14px 20px;display:flex;align-items:center;gap:16px;z-index:100;transition:all 0.3s}
#btc-panel.hide{opacity:0;transform:translateX(-400px);pointer-events:none}
.bp-icon{width:42px;height:42px;border-radius:50%;background:linear-gradient(135deg,#F7931A,#FF6B00);display:flex;align-items:center;justify-content:center;font-family:'Oswald',sans-serif;font-size:22px;font-weight:700;color:#fff;flex-shrink:0;box-shadow:0 0 20px rgba(247,147,26,0.25)}
.bp-info{display:flex;flex-direction:column;gap:2px}
.bp-label{font-family:'Oswald',sans-serif;font-size:11px;font-weight:600;letter-spacing:0.12em;color:var(--btc)}
#bp-price{font-family:'JetBrains Mono',monospace;font-size:28px;font-weight:700;color:#fff;letter-spacing:-0.02em}
.bp-row{display:flex;align-items:center;gap:10px}
#bp-change{font-family:'JetBrains Mono',monospace;font-size:13px;font-weight:700;padding:2px 8px;border-radius:6px}
#bp-change.up{background:var(--green-bg);color:var(--green)}
#bp-change.down{background:var(--red-bg);color:var(--red)}
#bp-change.flat{color:#666}
#bp-high,#bp-low{font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--muted)}
.bp-spark{flex-shrink:0}
.bp-spark canvas{display:block}

/* ═══ MARKETS — Slide-up carousel below topbar ═══ */
#markets{position:fixed;top:0;left:0;right:0;height:90px;background:rgba(5,5,7,0.5);backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);border-bottom:1px solid rgba(255,255,255,0.04);display:flex;align-items:center;overflow:hidden;z-index:95;transition:all 0.3s}
#markets.hide{opacity:0;transform:translateY(-94px);pointer-events:none}
.mk-header,.mk-tabs,.mk-btc{display:none}
#mk-cards{flex:1;overflow:hidden;position:relative;height:100%;padding:0}

/* Group card — slides up/down, holds 5 tiles */
.mk-card{position:absolute;inset:0;display:flex;align-items:stretch;padding:0;transition:transform 0.5s cubic-bezier(0.4,0,0.2,1),opacity 0.5s ease}
.mk-card.active{transform:translateY(0);opacity:1}
.mk-card.out-up{transform:translateY(-100%);opacity:0}
.mk-card.in-below{transform:translateY(100%);opacity:0}

/* Each tile = one event, stacked vertically */
.mk-tile{flex:1;display:flex;flex-direction:column;justify-content:center;padding:5px 14px;gap:2px;min-width:0;border-right:1px solid rgba(255,255,255,0.06)}
.mk-tile:last-child{border-right:none}

.mk-outcome{display:flex;align-items:center;gap:6px;min-width:0;height:18px}
.mk-vs{font-size:8px;color:var(--dim);font-family:'Oswald',sans-serif;letter-spacing:0.08em;text-transform:uppercase;padding-left:11px;line-height:1}
.mk-team-name{font-size:13px;font-weight:700;font-family:'Oswald',sans-serif;letter-spacing:0.03em;color:#fff;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;min-width:0;flex:1}
.mk-team-multi{font-family:'JetBrains Mono',monospace;font-size:12px;color:var(--blue);min-width:30px;text-align:right;flex-shrink:0}
.mk-team-pct{font-family:'JetBrains Mono',monospace;font-size:12px;font-weight:700;padding:2px 6px;border-radius:4px;min-width:36px;text-align:center;background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.06);flex-shrink:0}
.mk-team-pct.fav{background:var(--green-bg);border-color:rgba(0,230,118,0.15);color:var(--green)}
.mk-team-pct.dog{background:rgba(255,255,255,0.03);color:var(--muted)}
.mk-question{font-size:12px;font-weight:600;letter-spacing:0.06em;color:var(--muted);font-family:'Oswald',sans-serif;line-height:1.2;overflow:hidden;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical}
.mk-dot{width:5px;height:5px;border-radius:50%;background:var(--red);animation:pulse 1.4s infinite;flex-shrink:0}
.mk-counter{position:absolute;right:16px;bottom:4px;font-family:'JetBrains Mono',monospace;font-size:8px;color:var(--dim);letter-spacing:0.05em;z-index:2}

/* ═══ ALERTS ═══ */
#alerts{position:fixed;top:136px;left:16px;z-index:110;display:flex;flex-direction:column;gap:6px;max-width:360px}
.al{background:var(--glass);backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);border:1px solid rgba(255,109,0,0.15);border-left:3px solid var(--madness);padding:10px 14px;border-radius:0 14px 14px 0;animation:aIn 0.3s ease}
.al.out{animation:aOut 0.3s ease forwards}
.al-t{font-family:'Oswald',sans-serif;font-size:10px;font-weight:600;letter-spacing:0.12em;color:var(--madness);text-transform:uppercase}
.al-b{font-size:14px;color:#fff;margin-top:2px;line-height:1.3}
@keyframes aIn{from{opacity:0;transform:translateX(-20px)}to{opacity:1;transform:none}}
@keyframes aOut{from{opacity:1}to{opacity:0;transform:translateX(-20px)}}

/* ═══ TICKER ═══ */
#ticker{position:fixed;bottom:0;left:0;right:0;height:40px;background:rgba(5,5,7,0.5);border-top:1px solid rgba(255,255,255,0.04);display:flex;align-items:center;overflow:hidden;z-index:100;transition:all 0.3s}
#ticker.hide{opacity:0;transform:translateY(50px);pointer-events:none}
/* ticker-badge removed */
#ticker-scroll{flex:1;overflow:hidden;height:100%;position:relative}
#ticker-inner{display:flex;align-items:center;white-space:nowrap;font-size:12px;font-weight:600;height:100%;position:absolute;will-change:transform}
#ticker-inner.go{animation:scrollL var(--dur,45s) linear infinite}
.ti{padding:0 20px;display:flex;align-items:center;gap:6px;color:var(--muted)}
.ti .ts{font-family:'Oswald',sans-serif;color:#fff;font-weight:600;letter-spacing:0.04em}
.ti .tp{font-family:'JetBrains Mono',monospace;font-size:13px}
.ti .tc{font-family:'JetBrains Mono',monospace;font-size:11px}
.ti .tc.up{color:var(--green)}
.ti .tc.dn{color:var(--red)}
.sep{color:rgba(255,255,255,0.06);padding:0 2px}
@keyframes scrollL{0%{transform:translateX(0)}100%{transform:translateX(-50%)}}

/* ═══ CONTROLS ═══ */
#ctrl{position:fixed;top:88px;left:50%;transform:translateX(-50%);background:var(--glass);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border:1px solid rgba(255,255,255,0.08);border-radius:16px;padding:16px 20px;font-size:12px;color:var(--muted);z-index:200;line-height:2.2;min-width:220px;transition:all 0.2s}
#ctrl.hide{opacity:0;pointer-events:none}
#ctrl h4{font-family:'Oswald',sans-serif;color:#fff;font-size:13px;font-weight:600;letter-spacing:0.1em;margin-bottom:4px}
kbd{background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.08);border-radius:5px;padding:2px 7px;font-family:'JetBrains Mono',monospace;font-size:10px;color:#aaa}

/* ═══ PROMPT ═══ */
#aprompt{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.5);backdrop-filter:blur(4px);z-index:300;align-items:center;justify-content:center}
#aprompt.open{display:flex}
#aform{background:#111;border:1px solid #333;border-radius:16px;padding:24px 28px;min-width:380px}
#aform h3{font-family:'Oswald',sans-serif;font-size:16px;font-weight:600;margin-bottom:14px;letter-spacing:0.04em}
.ai{width:100%;background:#1a1a1a;border:1px solid #333;border-radius:10px;color:#fff;font-size:14px;font-family:'Inter',sans-serif;padding:10px 12px;outline:none;margin-bottom:8px}
.ai:focus{border-color:var(--madness)}
.ai.mono{font-size:12px;font-family:'JetBrains Mono',monospace;color:var(--madness)}
.fr{display:flex;gap:8px;margin-top:8px}
.btn{flex:1;padding:10px;border:1px solid #333;border-radius:10px;background:none;color:#fff;font-family:'Oswald',sans-serif;font-size:14px;font-weight:600;letter-spacing:0.06em;cursor:pointer;transition:background 0.15s}
.btn:hover{background:#1e1e1e}
.btn.pri{border-color:var(--madness);color:var(--madness)}
.btn.pri:hover{background:rgba(255,109,0,0.08)}


#wd{position:fixed;top:100px;left:50%;transform:translateX(-50%);height:0;overflow:hidden;border-radius:10px;font-family:'Oswald',sans-serif;font-size:13px;font-weight:600;letter-spacing:0.1em;z-index:150;display:flex;align-items:center;justify-content:center;padding:0 24px;transition:all 0.3s}
#wd.warn{height:36px;background:rgba(255,193,7,0.9);color:#000}
#wd.error{height:36px;background:var(--red);color:#fff}
#status{position:fixed;bottom:42px;left:8px;font-size:8px;color:rgba(255,255,255,0.06);font-family:'JetBrains Mono',monospace;z-index:50}
</style>
</head>

    </div>
  </div>
  <div class="bp-spark"><canvas id="bp-spark-cv" width="100" height="40"></canvas></div>
</div>

<div id="markets">
  <div id="mk-cards"></div>
</div>

<div id="alerts"></div>
<div id="ctrl" class="hide"><h4>CONTROLS</h4><kbd>H</kbd> Toggle HUD<br><kbd>S</kbd> Toggle BTC Panel<br><kbd>M</kbd> Toggle Markets<br><kbd>A</kbd> Push Alert<br><kbd>F</kbd> Fullscreen<br><kbd>?</kbd> This panel</div>
<div id="aprompt"><div id="aform"><h3>Push Alert</h3><input class="ai mono" id="al-label" placeholder="LABEL" value="UPSET ALERT" maxlength="40"><input class="ai" id="al-text" placeholder="Alert message..." maxlength="200"><div class="fr"><button class="btn" onclick="closeAP()">Cancel</button><button class="btn pri" onclick="submitAP()">Push</button></div></div></div>
<div id="status">PUBKEY WALL v4.1</div>

<script>
const CFG={fetchTimeout:8000,btcInt:10000,mktInt:12000,tikInt:30000,maxAlerts:5,alertDur:8000,wdWarn:60,wdErr:300,pxThresh:0.5,perPage:50};
function api(p){return 'https://api.gemini.com'+p}
const S={btcPrice:null,btcPct:null,lastBtcA:null,events:[],pf:null,lastOk:Date.now(),fails:0,paused:false,tab:'all',featured:null,featIdx:0};

async function sf(url,l){
  const ac=new AbortController(),t=setTimeout(()=>ac.abort(),CFG.fetchTimeout);
  try{const r=await fetch(url,{signal:ac.signal});clearTimeout(t);if(!r.ok){if(r.status===429)await new Promise(r=>setTimeout(r,Math.min(2000*Math.pow(2,S.fails),30000)));throw new Error('HTTP '+r.status)}let d;try{d=await r.json()}catch(e){throw new Error('JSON fail')}S.lastOk=Date.now();S.fails=0;wd();return d}catch(e){clearTimeout(t);S.fails++;wd();console.warn('['+l+']',e.message);return null}
}

function wd(){const el=document.getElementById('wd'),a=(Date.now()-S.lastOk)/1000;if(a>CFG.wdErr){el.className='error';el.textContent='NO SIGNAL — DATA OFFLINE'}else if(a>CFG.wdWarn){el.className='warn';el.textContent='RECONNECTING — '+Math.round(a)+'s'}else{el.className='';el.textContent=''}}
setInterval(wd,5000);

function tick(){const n=new Date(),h=n.getHours()%12||12;document.getElementById('clock').textContent=h+':'+String(n.getMinutes()).padStart(2,'0')+':'+String(n.getSeconds()).padStart(2,'0')+' '+(n.getHours()>=12?'PM':'AM')}
setInterval(tick,1000);tick();

let dayCandles=[];/* close prices since midnight for sparkline */
let dayHigh=0,dayLow=Infinity,dayOpen=0;
async function fetchBTC(){
  const d=await sf(api('/v1/pricefeed'),'BTC');if(!d||!Array.isArray(d))return;S.pf=d;
  const b=d.find(x=>x.pair==='BTCUSD');if(!b)return;
  const p=parseFloat(b.price),pct=parseFloat(b.percentChange24h);if(isNaN(p))return;
  S.btcPrice=p;S.btcPct=pct;
  const ps='$'+p.toLocaleString('en-US',{minimumFractionDigits:2,maximumFractionDigits:2});
  const sg=pct>=0?'+':'',cs=sg+pct.toFixed(2)+'%';
  /* Bottom-left BTC panel */
  document.getElementById('bp-price').textContent=ps;
  /* Day change % (from midnight open) */
  if(dayOpen>0){
    const dayPct=((p-dayOpen)/dayOpen)*100;
    const dsg=dayPct>=0?'+':'',dcs=dsg+dayPct.toFixed(2)+'%';
    const bpc=document.getElementById('bp-change');
    bpc.textContent=dcs;bpc.className=dayPct>0.01?'up':dayPct<-0.01?'down':'flat';
  }
  /* High/Low labels */
  if(dayHigh>0)document.getElementById('bp-high').textContent='H: $'+dayHigh.toLocaleString('en-US',{maximumFractionDigits:0});
  if(dayLow<Infinity)document.getElementById('bp-low').textContent='L: $'+dayLow.toLocaleString('en-US',{maximumFractionDigits:0});
}
async function fetchDayCandles(){
  /* Fetch 15-min candles, filter to since midnight local time */
  const d=await sf(api('/v2/candles/btcusd/15m'),'DayChart');
  if(!d||!Array.isArray(d)||!d.length)return;
  /* Gemini candles: [[time_ms,open,high,low,close,vol],...] newest first */
  const now=new Date();
  const midnight=new Date(now.getFullYear(),now.getMonth(),now.getDate()).getTime();
  /* Filter to candles since midnight, sort oldest first */
  const today=d.filter(c=>c[0]>=midnight).sort((a,b)=>a[0]-b[0]);
  if(!today.length)return;
  dayCandles=today.map(c=>parseFloat(c[4]));/* close prices */
  dayOpen=parseFloat(today[0][1]);/* open of first candle = midnight open */
  dayHigh=Math.max(...today.map(c=>parseFloat(c[2])));
  dayLow=Math.min(...today.map(c=>parseFloat(c[3])));
  /* Update current price into candles for real-time tip */
  if(S.btcPrice){
    dayCandles.push(S.btcPrice);
    if(S.btcPrice>dayHigh)dayHigh=S.btcPrice;
    if(S.btcPrice<dayLow)dayLow=S.btcPrice;
  }
  document.getElementById('bp-high').textContent='H: $'+dayHigh.toLocaleString('en-US',{maximumFractionDigits:0});
  document.getElementById('bp-low').textContent='L: $'+dayLow.toLocaleString('en-US',{maximumFractionDigits:0});
  drawSpark();
}
function drawSpark(){
  const cv=document.getElementById('bp-spark-cv');if(!cv)return;
  const ctx=cv.getContext('2d'),w=cv.width,h=cv.height;
  ctx.clearRect(0,0,w,h);
  if(dayCandles.length<2)return;
  const mn=dayLow||Math.min(...dayCandles),mx=dayHigh||Math.max(...dayCandles),rng=mx-mn||1;
  const cur=S.btcPrice||dayCandles[dayCandles.length-1];
  const up=dayOpen>0?(cur>=dayOpen):(cur>=dayCandles[0]);
  ctx.strokeStyle=up?'#00E676':'#FF1744';ctx.lineWidth=2;ctx.lineJoin='round';
  ctx.beginPath();
  dayCandles.forEach((v,i)=>{
    const x=(i/(dayCandles.length-1))*w,y=h-((v-mn)/rng)*(h-4)-2;
    i===0?ctx.moveTo(x,y):ctx.lineTo(x,y);
  });
  ctx.stroke();
  /* Gradient fill */
  const grad=ctx.createLinearGradient(0,0,0,h);
  grad.addColorStop(0,(up?'rgba(0,230,118,':'rgba(255,23,68,')+'.15)');
  grad.addColorStop(1,(up?'rgba(0,230,118,':'rgba(255,23,68,')+'.0)');
  ctx.lineTo(w,h);ctx.lineTo(0,h);ctx.closePath();ctx.fillStyle=grad;ctx.fill();
}

async function fetchMkts(){
  const d=await sf(api('/v1/prediction-markets/events?status=active&per_page='+CFG.perPage),'Mkts');if(!d)return;
  S.events=d.data||d.events||(Array.isArray(d)?d:[]);
  renderCards();
}

function gp(c){return parseFloat(c.prices?.lastTradePrice||c.prices?.buy?.yes||0.5)}

let mkGroups=[];let mkIdx=0;let mkTimer=null;const MK_PER=5;

function buildTile(ev){
  const cs=ev.contracts||[];if(!cs.length)return null;
  const sorted=[...cs].sort((a,b)=>gp(b)-gp(a));
  const c0=sorted[0],c1=sorted[1]||null;
  const p0=Math.round(gp(c0)*100);
  const b0=parseFloat(c0.prices?.buy?.yes||c0.prices?.bestAsk||0);
  const cat=(ev.category||'').toLowerCase();
  const isSport=cat==='sports';
  const catColor=isSport?'var(--madness)':cat==='politics'?'#448AFF':cat==='crypto'?'var(--btc)':'#7C4DFF';

  const tile=document.createElement('div');tile.className='mk-tile';

  /* Question/title */
  const qRow=document.createElement('div');qRow.className='mk-question';
  const qText=ev.title||ev.name||ev.description||'';
  qRow.textContent=qText;
  qRow.style.color=catColor;
  tile.appendChild(qRow);

  /* Outcome A */
  const o1=document.createElement('div');o1.className='mk-outcome';
  const dot1=document.createElement('span');dot1.className='mk-dot';dot1.style.background=catColor;
  const n1=document.createElement('span');n1.className='mk-team-name';n1.textContent=c0.label||'?';
  const m1=document.createElement('span');m1.className='mk-team-multi';m1.textContent=b0>0?(1/b0).toFixed(1)+'x':'--';
  const pc1=document.createElement('span');pc1.className='mk-team-pct fav';pc1.textContent=p0+'%';
  o1.appendChild(dot1);o1.appendChild(n1);o1.appendChild(m1);o1.appendChild(pc1);
  tile.appendChild(o1);

  /* vs + Outcome B */
  if(c1){
    const p1=Math.round(gp(c1)*100);
    const b1=parseFloat(c1.prices?.buy?.yes||c1.prices?.bestAsk||0);
    const o2=document.createElement('div');o2.className='mk-outcome';
    const sp2=document.createElement('span');sp2.style.cssText='width:5px;flex-shrink:0';
    const n2=document.createElement('span');n2.className='mk-team-name';n2.textContent=c1.label||'?';
    const m2=document.createElement('span');m2.className='mk-team-multi';m2.textContent=b1>0?(1/b1).toFixed(1)+'x':'--';
    const pc2=document.createElement('span');pc2.className='mk-team-pct dog';pc2.textContent=p1+'%';
    o2.appendChild(sp2);o2.appendChild(n2);o2.appendChild(m2);o2.appendChild(pc2);
    tile.appendChild(o2);
  }
  return tile;
}

function buildGroup(evts){
  const card=document.createElement('div');card.className='mk-card in-below';
  evts.forEach(ev=>{const t=buildTile(ev);if(t)card.appendChild(t)});
  return card.children.length?card:null;
}

function renderCards(){
  const container=document.getElementById('mk-cards');
  const allEvts=S.events.filter(e=>e.contracts&&e.contracts.length>=1);
  if(!allEvts.length)return;
  /* Chunk events into groups of MK_PER */
  mkGroups=[];
  for(let i=0;i<allEvts.length;i+=MK_PER){mkGroups.push(allEvts.slice(i,i+MK_PER))}
  /* Show first group */
  container.textContent='';
  const first=buildGroup(mkGroups[0]);if(!first)return;
  const ctr=document.createElement('div');ctr.className='mk-counter';ctr.id='mk-ctr';
  ctr.textContent='1 / '+mkGroups.length;
  container.appendChild(first);container.appendChild(ctr);
  requestAnimationFrame(()=>{first.classList.remove('in-below');first.classList.add('active')});
  mkIdx=0;
  if(mkTimer)clearInterval(mkTimer);
  mkTimer=setInterval(advanceCard,7000);
}

function advanceCard(){
  if(!mkGroups.length||S.paused)return;
  const container=document.getElementById('mk-cards');
  mkIdx=(mkIdx+1)%mkGroups.length;
  const newCard=buildGroup(mkGroups[mkIdx]);if(!newCard)return;
  const oldCard=container.querySelector('.mk-card.active');
  if(oldCard){oldCard.classList.remove('active');oldCard.classList.add('out-up');setTimeout(()=>{if(oldCard.parentNode)oldCard.remove()},500)}
  container.appendChild(newCard);
  requestAnimationFrame(()=>{requestAnimationFrame(()=>{newCard.classList.remove('in-below');newCard.classList.add('active')})});
  const ctr=document.getElementById('mk-ctr');
  if(ctr)ctr.textContent=(mkIdx+1)+' / '+mkGroups.length;
}

function renderScoresTicker(){
  const inner=document.getElementById('ticker-inner');inner.classList.remove('go');
  const f=document.createDocumentFragment();
  const games=S.events.filter(e=>(e.template==='sports-game'||e.contracts?.length===2));
  if(!games.length)return;
  /* BTC price first */
  if(S.btcPrice){
    const bi=document.createElement('span');bi.className='ti';
    const bs=document.createElement('span');bs.className='ts';bs.style.color='var(--btc)';bs.textContent='BTC';
    const bp=document.createElement('span');bp.className='tp';bp.textContent=' $'+S.btcPrice.toLocaleString('en-US',{minimumFractionDigits:2,maximumFractionDigits:2})+' ';
    const bc=document.createElement('span');bc.className='tc '+(S.btcPct>=0?'up':'dn');bc.textContent=(S.btcPct>=0?'+':'')+S.btcPct.toFixed(2)+'%';
    bi.appendChild(bs);bi.appendChild(bp);bi.appendChild(bc);f.appendChild(bi);
    const sp=document.createElement('span');sp.className='sep';sp.textContent='|';f.appendChild(sp);
  }
  games.forEach(ev=>{
    const cs=ev.contracts||[];if(cs.length<2)return;
    const c0=cs[0],c1=cs[1];
    const p0=Math.round(gp(c0)*100),p1=Math.round(gp(c1)*100);
    const b0=parseFloat(c0.prices?.buy?.yes||c0.prices?.bestAsk||0);
    const b1=parseFloat(c1.prices?.buy?.yes||c1.prices?.bestAsk||0);
    const it=document.createElement('span');it.className='ti';
    /* Team 1 */
    const n1=document.createElement('span');n1.className='ts';n1.textContent=(c0.label||'?');
    const pct1=document.createElement('span');pct1.className='tc '+(p0>=p1?'up':'dn');pct1.textContent=' '+p0+'%';
    const m1=document.createElement('span');m1.className='tp';m1.style.color='var(--blue)';m1.textContent=' '+(b0>0?(1/b0).toFixed(1)+'x':'');
    /* vs */
    const vs=document.createElement('span');vs.style.cssText='color:var(--dim);font-size:10px;padding:0 4px';vs.textContent='vs';
    /* Team 2 */
    const n2=document.createElement('span');n2.className='ts';n2.textContent=(c1.label||'?');
    const pct2=document.createElement('span');pct2.className='tc '+(p1>=p0?'up':'dn');pct2.textContent=' '+p1+'%';
    const m2=document.createElement('span');m2.className='tp';m2.style.color='var(--blue)';m2.textContent=' '+(b1>0?(1/b1).toFixed(1)+'x':'');
    it.appendChild(n1);it.appendChild(pct1);it.appendChild(m1);it.appendChild(vs);it.appendChild(n2);it.appendChild(pct2);it.appendChild(m2);
    f.appendChild(it);
    const sep=document.createElement('span');sep.className='sep';sep.textContent='|';f.appendChild(sep);
  });
  inner.textContent='';inner.appendChild(f);
  const cl=f.cloneNode(true);inner.appendChild(cl);
  requestAnimationFrame(()=>{
    const w=inner.scrollWidth/2;const dur=Math.max(w/50,20);
    inner.style.setProperty('--dur',dur+'s');
    inner.classList.add('go');
  });
}

function pushA(l,b,d){d=d||CFG.alertDur;const c=document.getElementById('alerts');while(c.children.length>=CFG.maxAlerts)c.removeChild(c.firstChild);const el=document.createElement('div');el.className='al';const t=document.createElement('div');t.className='al-t';t.textContent=l;const bd=document.createElement('div');bd.className='al-b';bd.textContent=b;el.appendChild(t);el.appendChild(bd);c.appendChild(el);setTimeout(()=>{el.classList.add('out');setTimeout(()=>{if(el.parentNode)el.remove()},300)},d)}
function openAP(){document.getElementById('aprompt').classList.add('open');const i=document.getElementById('al-text');i.value='';setTimeout(()=>i.focus(),100)}
function closeAP(){document.getElementById('aprompt').classList.remove('open')}
function submitAP(){const l=document.getElementById('al-label').value||'ALERT',t=document.getElementById('al-text').value;if(t.trim())pushA(l.toUpperCase(),t);closeAP()}
document.getElementById('al-text').addEventListener('keydown',e=>{if(e.key==='Enter')submitAP();if(e.key==='Escape')closeAP()});

function checkPA(){if(S.btcPrice&&S.lastBtcA){const d=((S.btcPrice-S.lastBtcA)/S.lastBtcA)*100;if(Math.abs(d)>CFG.pxThresh){pushA('BTC '+(d>0?'UP':'DOWN'),'$'+S.btcPrice.toLocaleString('en-US',{minimumFractionDigits:2})+' ('+(d>0?'+':'')+d.toFixed(2)+'%)',6000);S.lastBtcA=S.btcPrice}}else S.lastBtcA=S.btcPrice}

document.addEventListener('keydown',e=>{if(e.target.tagName==='INPUT')return;switch(e.key.toLowerCase()){case 'h':document.getElementById('logo-bar').classList.toggle('hide');break;case 's':document.getElementById('btc-panel').classList.toggle('hide');break;case 'm':document.getElementById('markets').classList.toggle('hide');break;case 'a':openAP();break;case 'f':document.fullscreenElement?document.exitFullscreen():document.documentElement.requestFullscreen();break;case '?':document.getElementById('ctrl').classList.toggle('hide');break;case 'escape':closeAP();document.getElementById('ctrl').classList.add('hide');break}});

document.addEventListener('visibilitychange',()=>{if(document.hidden){S.paused=true}else{S.paused=false}});

async function init(){await fetchDayCandles();await fetchBTC();await fetchMkts();pushA('PUBKEY DC','Gemini prediction markets live',6000);setInterval(async()=>{if(!S.paused){await fetchBTC();checkPA()}},CFG.btcInt);setInterval(async()=>{if(!S.paused)await fetchMkts()},CFG.mktInt);setInterval(async()=>{if(!S.paused)await fetchDayCandles()},60000)}
init();
/* Auto-refresh page every 5 minutes to stay fresh & prevent memory leaks */
setTimeout(()=>location.reload(),5*60*1000);
</script>
</body>
</html>
